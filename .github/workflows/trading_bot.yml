name: Run QuantumTrader Daily

on:
  schedule:
    - cron: '35 14 * * 1-5' # Se ejecuta de lunes a viernes
  workflow_dispatch: # Permite ejecutarlo manualmente

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Permite al bot guardar cambios en el CSV
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install matplotlib # Nos aseguramos de tener la librería de gráficos

      - name: Run Bot (Analisis y Auditoria)
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python main.py

      - name: Generar y Enviar Reporte Visual
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python report_generator.py

      - name: Commit and Push changes
        run: |
          git config --global user.name "QuantumBot"
          git config --global user.email "bot@github.com"
          git add .
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update: Registro de predicciones y reporte [skip ci]" && git push)