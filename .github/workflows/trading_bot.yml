name: QuantumTrader AI Bot V9

on:
  schedule:
    # Se ejecuta a las 15:45 hasta las 22:45 hora de Italia (Mercado de NY abierto)
    - cron: '45 14-21 * * 1-5'
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout del repositorio
      uses: actions/checkout@v3

    - name: Configurar Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
        # CACHÉ ELIMINADA: El servidor ya no recordará errores pasados

    - name: Instalar Infraestructura Cuantitativa
      run: |
        python -m pip install --upgrade pip
        
        # 1. Destruir versiones preinstaladas corruptas del servidor Ubuntu
        pip uninstall -y websockets yfinance
        
        # 2. Instalación limpia y sin memoria caché (El bypass definitivo)
        pip install --no-cache-dir yfinance "websockets>=11.0"
        
        # 3. Librerías Core y API Broker
        pip install --no-cache-dir pandas requests matplotlib scikit-learn xgboost joblib alpaca-trade-api
        
        # 4. Deep Learning (TensorFlow CPU)
        pip install --no-cache-dir tensorflow-cpu
        
        # 5. Procesamiento de Lenguaje (Torch CPU y Transformers)
        pip install --no-cache-dir torch torchvision torchaudio --index-url https://download.pytorch.org/whl/cpu
        pip install --no-cache-dir transformers
    - name: Ejecutar Orquestador V9
      env:
        TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
        ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}
        ALPACA_BASE_URL: https://paper-api.alpaca.markets
      run: python main.py

    - name: Sincronizar y guardar resultados
      run: |
        git config --global user.name 'github-actions[bot]'
        git config --global user.email 'github-actions[bot]@users.noreply.github.com'
        # Eliminamos wallet.json del rastreo porque ya usamos Alpaca
        git add historial_decisiones.csv reporte_diario.png balance_history.csv
        git diff --quiet && git diff --staged --quiet || git commit -m "🤖 Actualización V9: Barrido de IA y Operaciones Alpaca"
        git push origin main
