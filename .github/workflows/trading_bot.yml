name: QuantumTrader AI Bot V9
# 2. Librerías Core y API Broker (Añadido python-dotenv)
pip install pandas requests matplotlib scikit-learn xgboost joblib alpaca-trade-api python-dotenv
on:
  schedule:
    # Se ejecuta a las 15:45 hasta las 22:45 hora de Italia (Mercado de NY abierto)
    - cron: '45 14-21 * * 1-5'
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout del repositorio
      uses: actions/checkout@v3

    - name: Configurar Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
        # CACHÉ ELIMINADA: El servidor ya no recordará errores pasados

    - name: Instalar Infraestructura Cuantitativa
      run: |
        python -m pip install --upgrade pip
        
        # 1. El Tratado de Paz: Congelar yfinance en una versión estable
        pip install yfinance==0.2.31
        
        # 2. Librerías Core y API Broker (Alpaca instalará su websocket compatible)
        pip install pandas requests matplotlib scikit-learn xgboost joblib alpaca-trade-api
        
        # 3. Deep Learning (TensorFlow CPU)
        pip install tensorflow-cpu
        
        # 4. Procesamiento de Lenguaje (Torch CPU y Transformers)
        pip install torch torchvision torchaudio --index-url https://download.pytorch.org/whl/cpu
        pip install transformers
        
    - name: Ejecutar Orquestador V9
      env:
        TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
        ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}
        ALPACA_BASE_URL: https://paper-api.alpaca.markets
      run: python main.py

    - name: Sincronizar y guardar resultados
      run: |
        git config --global user.name 'github-actions[bot]'
        git config --global user.email 'github-actions[bot]@users.noreply.github.com'
        # Eliminamos wallet.json del rastreo porque ya usamos Alpaca
        git add historial_decisiones.csv reporte_diario.png balance_history.csv
        git diff --quiet && git diff --staged --quiet || git commit -m "🤖 Actualización V9: Barrido de IA y Operaciones Alpaca"
        git push origin main
