name: Run QuantumTrader Daily

on:
  schedule:
    - cron: '35 14 * * 1-5'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write # IMPORTANTE: Permiso para guardar el CSV
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Bot
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python main.py

      - name: Commit and Push changes
        run: |
          git config --global user.name "QuantumBot"
          git config --global user.email "bot@github.com"
          # El punto '.' añade todos los archivos nuevos o modificados
          git add . 
          # Solo hace el commit si hay algo nuevo que subir
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update: Registro de predicciones [skip ci]" && git push)

      - name: Generar Reporte
        run: python report_generator.py

      - name: Generar y Enviar Reporte Visual
        env:
        TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python report_generator.py