name: Run QuantumTrader Daily

on:
  schedule:
    - cron: '35 14 * * 1-5' # 15:35 en Italia
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install -r requirements.txt matplotlib requests pandas yfinance

      - name: 1. Analizar Rendimiento
        run: python analizador_rendimiento.py

      - name: 2. Ejecutar Bot Selectivo
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python main.py

      - name: 3. Generar Reporte Visual
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python report_generator.py

      - name: Guardar Cambios
        run: |
          git config --global user.name "QuantumBot"
          git config --global user.email "bot@github.com"
          git add .
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update: Analisis y Elegidos [skip ci]" && git push)